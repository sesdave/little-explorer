name: Deploy Little Explorer to AWS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-west-1
  ECR_REGISTRY: 339713127263.dkr.ecr.us-west-1.amazonaws.com
  ECR_REPOSITORY: little-explorer-repo
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: little-explorer

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Setup AWS Credentials (GitHub runner)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 2. Login to ECR (GitHub runner)
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 3. Build and Push Image
      - name: Build, Tag, and Push Image to ECR
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          docker build \
            --build-arg VITE_API_URL=$VITE_API_URL \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 4. Deploy to EC2
            # 4. Deploy to EC2 via SSH
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "🚀 Logging into ECR..."
            aws ecr get-login-password --region us-west-1 | docker login --username AWS --password-stdin 339713127263.dkr.ecr.us-west-1.amazonaws.com

            echo "📦 Pulling latest image..."
            docker pull 339713127263.dkr.ecr.us-west-1.amazonaws.com/little-explorer-repo:latest

            echo "🛑 Stopping old container..."
            docker rm -f little-explorer || true

            echo "▶️ Starting new container on port 4000..."
            docker run -d \
              --name little-explorer \
              -p 4000:4000 \
              --restart always \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e AWS_REGION="${{ secrets.AWS_REGION }}" \
              -e AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e SENDGRID_API_KEY="${{ secrets.SENDGRID_API_KEY }}" \
              -e TWILIO_AUTH_TOKEN="${{ secrets.TWILIO_AUTH_TOKEN }}" \
              -e TWILIO_SID="${{ secrets.TWILIO_SID }}" \
              -e TWILIO_PHONE_NUMBER="${{ secrets.TWILIO_PHONE_NUMBER }}" \
              -e VITE_PAYSTACK_PUBLIC_KEY="${{ secrets.VITE_PAYSTACK_PUBLIC_KEY }}" \
              -e PAYSTACK_SECRET_KEY="${{ secrets.PAYSTACK_SECRET_KEY }}" \
              -e FRONTEND_URL="${{ secrets.FRONTEND_URL }}" \
              339713127263.dkr.ecr.us-west-1.amazonaws.com/little-explorer-repo:latest

            echo "🗄️ Running migrations..."
            docker run --rm \
              --env DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              339713127263.dkr.ecr.us-west-1.amazonaws.com/little-explorer-repo:latest \
              npx prisma migrate deploy

            echo "🌐 Installing Nginx + Certbot (if not installed)..."
            sudo dnf install -y nginx certbot python3-certbot-nginx || true

            echo "⚙️ Writing Nginx config..."
            sudo tee /etc/nginx/conf.d/app.conf > /dev/null <<EOF
            server {
                listen 80;
                server_name imaag.it.com;

                location / {
                    proxy_pass http://localhost:4000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_cache_bypass \$http_upgrade;
                }
            }
            EOF

            echo "🔁 Restarting Nginx..."
            sudo systemctl enable nginx
            sudo systemctl restart nginx

            echo "🔐 Setting up SSL (first run only)..."
            sudo certbot --nginx -d imaag.it.com --non-interactive --agree-tos -m sesughdtyohemba@gmail.com || true

            echo "♻️ Enabling auto-renew..."
            sudo systemctl enable certbot-renew.timer
            sudo systemctl start certbot-renew.timer

            echo "✅ Deployment complete!"